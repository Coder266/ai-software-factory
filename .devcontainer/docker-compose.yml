name: expense-app

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: sleep infinity
    # Land every `exec` (claude, shell, go run) on the mounted code by default.
    working_dir: /workspace
    volumes:
      - ..:/workspace:cached
      # Claude Code's login + config live here, in a named volume that is
      # independent of your host. Log in once inside the container and it
      # persists across restarts and rebuilds (see `make logout` to reset).
      - claude-config:/home/vscode/.claude
      # The GitHub CLI's login + config live here, in their own named volume
      # (mirroring the Claude pattern above). `gh` stores its token under
      # ~/.config/gh, so persisting that dir keeps you logged in to GitHub
      # across restarts and rebuilds. HTTPS git push/pull is wired to that same
      # token by a system-level credential helper baked into the image (see the
      # Dockerfile), so it works on every start path — including `make shell` /
      # `make claude`, which use raw `docker compose` and never run devcontainer
      # lifecycle hooks. Run `gh auth login` once inside the container; reset
      # with `make gh-logout`.
      - gh-config:/home/vscode/.config/gh
    environment:
      DATABASE_URL: postgres://expense:expense@db:5432/expense?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      - db

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: expense
      POSTGRES_PASSWORD: expense
      POSTGRES_DB: expense
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
  claude-config:
  gh-config:
